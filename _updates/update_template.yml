# ============================================================
# WEBPAGE UPDATE FORM — aguazz.github.io
# ============================================================
# How to use:
#   1. Copy this file to  _updates/update.yml
#   2. Fill in the entries you want to add (delete the rest)
#   3. Place any PDF files in  _updates/attachments/
#   4. Commit everything and push to master
#      The automation will update the site and archive this form.
#
# Notes:
#   - Fields marked (optional) can be left blank or deleted
#   - You can include multiple publications and/or talks at once
#   - New coauthors: add them manually to _data/coauthors.yml
#   - See _updates/README.md for the full field reference
# ============================================================


# ---- PUBLICATIONS -----------------------------------------
# Add one block per new publication.
# Delete this whole section if you have no new publications.

publications:

  - type: article          # article | inproceedings | preprint
    title: ""
    authors: ""            # "Azze, Abel and D'Auria, Bernardo and ..."
    journal: ""            # journal name; conference name for inproceedings
    year: 2025
    volume:                # (optional)
    number:                # (optional)
    pages: ""              # (optional) e.g. "1--34"
    doi: ""                # (optional) e.g. "10.1017/apr.2024.21"
    arxiv: ""              # (optional) arXiv ID only, e.g. "2211.05835"
    selected: false        # true = show as featured paper on homepage


# ---- TALKS ------------------------------------------------
# Add one block per new talk, seminar, or poster.
# Delete this whole section if you have no new talks.
# Place any PDF slides in _updates/attachments/ and reference
# them by filename in the `slides` field below.

talks:

  - title: ""
    type: Talk             # Talk | Invited Talk | Seminar | Poster
    venue: ""              # Full name of the event
    date: 2025-01-01       # YYYY-MM-DD  (use start date for multi-day events)
    location: ""           # City, Country
    coauthors: ""          # (optional) e.g. "Bernardo D'Auria"
    slides: ""             # (optional) filename in _updates/attachments/
