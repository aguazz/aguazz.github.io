name: Update site from form

# Triggered when update.yml is pushed to master.
# Runs the Python updater, commits the result, then dispatches a deploy.
on:
  push:
    branches: [master, main]
    paths:
      - "_updates/update.yml"

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Run updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python _updates/update_site.py

      - name: Commit changes
        run: |
          git config user.name  "site-updater[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet \
            && echo "Nothing to commit." \
            || git commit -m "chore: auto-update publications/talks from form"
          git push

      # GITHUB_TOKEN pushes do not trigger other workflows, so we dispatch
      # the deploy explicitly after committing the updated source files.
      - name: Trigger deploy
        run: gh workflow run "Deploy site" --ref master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
